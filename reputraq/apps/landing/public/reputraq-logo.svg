<svg xmlns="http://www.w3.org/2000/svg" width="520" height="120" viewBox="0 0 520 120" fill="none">
  <!-- Simple, robust wordmark SVG (renders consistently on Vercel/Linux) -->
  <defs>
    <linearGradient id="rqBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0093DD"/>
      <stop offset="1" stop-color="#004163"/>
    </linearGradient>
  </defs>

  <!-- Mark -->
  <g transform="translate(18 18)">
    <circle cx="42" cy="42" r="40" stroke="url(#rqBlue)" stroke-width="8" opacity="0.95"/>
    <path d="M18 54 L34 38 L44 48 L66 26" stroke="#0093DD" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M66 26 L66 44" stroke="#0093DD" stroke-width="10" stroke-linecap="round"/>
    <path d="M66 26 L48 26" stroke="#0093DD" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(120 34)">
    <text
      x="0"
      y="30"
      font-family="Helvetica, Arial, sans-serif"
      font-size="40"
      font-weight="800"
      letter-spacing="1.2"
      fill="#101010"
    >
      REPUTRAQ
    </text>
    <text
      x="2"
      y="58"
      font-family="Helvetica, Arial, sans-serif"
      font-size="12"
      font-weight="600"
      letter-spacing="3"
      fill="#004163"
      opacity="0.9"
    >
      INFORMATION SYSTEM
    </text>
  </g>
</svg>
